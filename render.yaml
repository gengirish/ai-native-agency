services:
  - type: web
    name: ai-native-agency
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:migrate
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
