# fly.toml app configuration file generated for ai-native-agency on 2026-04-05T23:40:53+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-native-agency'
primary_region = 'iad'

[build]

[deploy]
  release_command = "node db/migrate.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
